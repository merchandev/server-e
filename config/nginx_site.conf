# Configuración del sitio E-Server (solo server block — va dentro de http{})
# Icecast corre en puerto 8100 (único para El Oriental — aislado del resto)
upstream icecast_backend {
    server icecast:8100;
    keepalive 32;
}

# SERVIDOR HTTP (Puerto 80) — Traefik enruta radio.diarioeloriental.com aquí
server {
    listen 80;
    server_name radio.diarioeloriental.com _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }

    location /embed.html {
        root /usr/share/nginx/html;
        try_files /embed.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
    }

    # Proxy Reverso para Icecast (stream de audio)
    location /radio.aac {
        proxy_pass http://icecast_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # OPTIMIZACIÓN CRÍTICA PARA STREAMING
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        tcp_nodelay on;

        # CORS Headers
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }
}
