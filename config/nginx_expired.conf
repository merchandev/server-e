events {
    worker_connections 256;
}

http {
    server {
        listen 80 default_server;
        server_name _;

        # Página de licencia vencida — devuelve 403 a todo
        location / {
            default_type text/html;
            return 403 "<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><title>Servicio Expirado</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}body{background:#0a0e1a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}.box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);border-radius:16px;padding:48px 40px;max-width:400px}.icon{font-size:3rem;margin-bottom:16px}h1{font-size:1.4rem;margin-bottom:12px;color:#ef4444}p{color:#94a3b8;font-size:0.9rem;line-height:1.6}</style></head><body><div class='box'><div class='icon'>🔒</div><h1>Servicio Vencido</h1><p>La licencia de E-Server Streaming Radio venció el <strong>28 de mayo de 2027</strong>.<br><br>Para renovar el servicio, contacte al administrador.</p></div></body></html>";
        }

        # El stream tampoco debe funcionar
        location /radio.aac {
            return 403;
        }
    }
}
