<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Radio E-Server - Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: transparent; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .widget {
            background: linear-gradient(135deg, rgba(20,28,50,0.95) 0%, rgba(10,14,26,0.98) 100%);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 280px;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(239,68,68,0.1);
        }

        .play-btn {
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(239,68,68,0.4);
            transition: all 0.25s ease;
        }
        .play-btn:hover { transform: scale(1.08); }
        .play-btn:disabled { background: #374151; box-shadow: none; cursor: not-allowed; transform: none; opacity: 0.4; }

        .play-icon {
            width: 0; height: 0;
            border-style: solid;
            border-width: 9px 0 9px 16px;
            border-color: transparent transparent transparent #fff;
            margin-left: 3px;
        }
        .pause-icon {
            width: 14px; height: 18px;
            border-style: solid;
            border-width: 0 5px 0 5px;
            border-color: transparent #fff transparent #fff;
        }

        .info { flex: 1; min-width: 0; }
        .station-name { font-size: 0.9rem; font-weight: 800; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-sub { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

        .status-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; animation: pulse 2s infinite; flex-shrink: 0; }
        .dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .dot.expired { background: #6b7280; box-shadow: none; animation: none; }
        .status-label { font-size: 0.72rem; font-weight: 600; color: #cbd5e1; letter-spacing: 1px; }

        .waves-mini { display: flex; align-items: center; gap: 3px; height: 18px; opacity: 0; transition: opacity 0.3s; }
        .waves-mini.playing { opacity: 1; }
        .wave-bar { width: 3px; border-radius: 2px; background: linear-gradient(#ef4444, #f59e0b); animation: wave-bounce 1.2s infinite ease-in-out; }
        .wave-bar:nth-child(1) { animation-delay: -1.1s; }
        .wave-bar:nth-child(2) { animation-delay: -0.9s; }
        .wave-bar:nth-child(3) { animation-delay: -0.7s; }

        @keyframes wave-bounce {
            0%, 40%, 100% { height: 4px; }
            20% { height: 18px; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="widget">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <div class="play-icon" id="btnIcon"></div>
        </button>
        <div class="info">
            <div class="station-name">Streaming Radio</div>
            <div class="station-sub">E-Server · En Vivo</div>
            <div class="status-row">
                <div class="dot" id="dot"></div>
                <span class="status-label" id="statusLabel">DETENIDO</span>
                <div class="waves-mini" id="wavesMini">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="radioPlayer" preload="none"></audio>

    <script>
        // ===========================================================
        // CONTROL DE EXPIRACIÓN — 2027-05-28 23:59:59
        // ===========================================================
        const EXPIRY_DATE = new Date('2027-05-28T23:59:59');

        function checkExpiry() {
            if (new Date() >= EXPIRY_DATE) {
                const btn = document.getElementById('playBtn');
                btn.disabled = true;
                document.getElementById('dot').className = 'dot expired';
                document.getElementById('statusLabel').textContent = 'VENCIDO';
                return true;
            }
            return false;
        }

        const isExpired = checkExpiry();
        if (!isExpired) setInterval(checkExpiry, 60000);

        // ===========================================================
        // REPRODUCTOR
        // ===========================================================
        const audio = document.getElementById('radioPlayer');
        const btnIcon = document.getElementById('btnIcon');
        const dot = document.getElementById('dot');
        const statusLabel = document.getElementById('statusLabel');
        const wavesMini = document.getElementById('wavesMini');
        const STREAM_URL = 'https://radio.diarioeloriental.com/radio.aac';
        let isPlaying = false;

        function togglePlay() {
            if (checkExpiry()) return;
            if (isPlaying) {
                audio.pause(); audio.src = ''; isPlaying = false;
                btnIcon.className = 'play-icon';
                dot.classList.remove('live');
                statusLabel.textContent = 'DETENIDO';
                wavesMini.classList.remove('playing');
            } else {
                audio.src = STREAM_URL + '?t=' + Date.now();
                statusLabel.textContent = 'CONECTANDO...';
                audio.play().then(() => {
                    isPlaying = true;
                    btnIcon.className = 'pause-icon';
                    dot.classList.add('live');
                    statusLabel.textContent = 'EN VIVO';
                    wavesMini.classList.add('playing');
                }).catch(() => { statusLabel.textContent = 'ERROR'; isPlaying = false; });
            }
        }
    </script>
</body>
</html>
