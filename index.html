<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Radio E-Server - En Vivo</title>
    <meta name="description" content="Streaming Radio E-Server. Escucha en vivo.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0e1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(220, 38, 38, 0.15), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(234, 179, 8, 0.10), transparent 30%);
        }

        .player-container {
            background: rgba(20, 28, 50, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(220,38,38,0.08);
            transition: transform 0.3s ease;
        }

        .player-container:hover {
            transform: translateY(-5px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .logo-sub {
            font-size: 1rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .play-btn {
            background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%);
            border: none;
            border-radius: 50%;
            width: 84px;
            height: 84px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            cursor: pointer;
            box-shadow: 0 10px 30px -5px rgba(239, 68, 68, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 16px 40px -5px rgba(239, 68, 68, 0.65);
        }

        .play-btn:disabled {
            background: #374151;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 26px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 6px;
            transition: all 0.3s;
        }

        .pause-icon {
            width: 22px;
            height: 26px;
            border-style: solid;
            border-width: 0 6px 0 6px;
            border-color: transparent #ffffff transparent #ffffff;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background-color: #22c55e;
            box-shadow: 0 0 12px #22c55e;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .status-text {
            font-size: 0.9rem;
            color: #cbd5e1;
            font-weight: 600;
            letter-spacing: 1.5px;
        }

        .waves {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            height: 30px;
            margin-top: 10px;
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .waves.playing { opacity: 1; }

        .wave {
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%);
            border-radius: 2px;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .wave:nth-child(1) { animation-delay: -1.1s; }
        .wave:nth-child(2) { animation-delay: -1.0s; }
        .wave:nth-child(3) { animation-delay: -0.9s; }
        .wave:nth-child(4) { animation-delay: -0.8s; }
        .wave:nth-child(5) { animation-delay: -0.7s; }

        @keyframes bounce {
            0%, 40%, 100% { transform: scaleY(0.4); }
            20% { transform: scaleY(1); }
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 22px;
            background: rgba(10, 14, 26, 0.6);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .volume-icon {
            width: 20px;
            height: 20px;
            fill: #94a3b8;
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #374151;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        .footer {
            margin-top: 48px;
            color: #475569;
            font-size: 0.78rem;
            text-align: center;
            line-height: 1.6;
        }

        /* === ESTADO EXPIRADO === */
        .expired-banner {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }

        .expired-banner.show { display: block; }

        .expired-banner h2 {
            color: #ef4444;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .expired-banner p {
            color: #94a3b8;
            font-size: 0.82rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="player-container" id="playerContainer">
        <div class="logo">Streaming Radio</div>
        <div class="logo-sub">E-Server</div>
        <p class="subtitle">En Vivo · Streaming</p>

        <!-- Banner de expiración (oculto hasta que venza) -->
        <div class="expired-banner" id="expiredBanner">
            <h2>🔒 Servicio Vencido</h2>
            <p>La licencia venció el <strong>28 de mayo de 2027</strong>.<br>
            Contacte al administrador para renovar.</p>
        </div>

        <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <div class="play-icon" id="btnIcon"></div>
        </button>

        <div class="status-container">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">DETENIDO</span>
        </div>

        <div class="waves" id="waves">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>

        <div class="volume-container">
            <svg class="volume-icon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="changeVolume()">
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Streaming Radio E-Server. Todos los derechos reservados.
    </div>

    <!-- Audio Element -->
    <audio id="radioPlayer" preload="none"></audio>

    <script>
        // ===========================================================
        // CONTROL DE EXPIRACIÓN — 2027-05-28 23:59:59 (hora local)
        // ===========================================================
        const EXPIRY_DATE = new Date('2027-05-28T23:59:59');

        function checkExpiry() {
            const now = new Date();
            if (now >= EXPIRY_DATE) {
                // Bloquear completamente la interfaz
                document.getElementById('expiredBanner').classList.add('show');
                const btn = document.getElementById('playBtn');
                btn.disabled = true;
                btn.style.opacity = '0.3';
                document.getElementById('statusText').textContent = 'LICENCIA VENCIDA';
                document.getElementById('volumeSlider').disabled = true;
                return true; // expirado
            }
            return false; // vigente
        }

        // Verificar al cargar y cada minuto
        const isExpired = checkExpiry();
        if (!isExpired) {
            setInterval(checkExpiry, 60000);
        }

        // ===========================================================
        // REPRODUCTOR
        // ===========================================================
        const audio = document.getElementById('radioPlayer');
        const btnIcon = document.getElementById('btnIcon');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const waves = document.getElementById('waves');
        const volumeSlider = document.getElementById('volumeSlider');

        const STREAM_URL = 'https://radio.diarioeloriental.com/radio.aac';
        let isPlaying = false;

        function togglePlay() {
            // No hacer nada si el servicio venció
            if (checkExpiry()) return;

            if (isPlaying) {
                audio.pause();
                audio.src = '';
                isPlaying = false;
                btnIcon.className = 'play-icon';
                btnIcon.style.marginLeft = '6px';
                statusDot.classList.remove('active');
                statusText.textContent = 'DETENIDO';
                waves.classList.remove('playing');
            } else {
                audio.src = STREAM_URL + '?t=' + new Date().getTime();
                statusText.textContent = 'CONECTANDO...';

                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isPlaying = true;
                        btnIcon.className = 'pause-icon';
                        btnIcon.style.marginLeft = '0';
                        statusDot.classList.add('active');
                        statusText.textContent = 'EN VIVO';
                        waves.classList.add('playing');
                    }).catch(error => {
                        console.error('Playback failed:', error);
                        statusText.textContent = 'ERROR AL CONECTAR';
                        isPlaying = false;
                    });
                }
            }
        }

        function changeVolume() {
            audio.volume = volumeSlider.value;
        }

        audio.volume = volumeSlider.value;

        // Si está reproduciendo cuando vence → cortar stream
        audio.addEventListener('play', () => {
            if (checkExpiry()) {
                audio.pause();
                audio.src = '';
            }
        });
    </script>
</body>
</html>
